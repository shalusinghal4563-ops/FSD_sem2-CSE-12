<!DOCTYPE html>
<html>
<head>
<title>Student Marks System</title>

<style>
body{
font-family: Arial;
background:bisque;
text-align:center;
}

.container{
width:70%;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
padding:8px;
margin:5px;
}

button{
padding:10px;
margin:5px;
cursor:pointer;
background:plum;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#0056b3;
}

#output{
margin-top:20px;
text-align:left;
}
</style>
</head>

<body>

<div class="container">

<h2>Student Marks Management System</h2>

<input type="text" id="name" placeholder="Student Name">
<input type="text" id="roll" placeholder="Roll Number"><br>

<input type="number" id="math" placeholder="Math Marks">
<input type="number" id="science" placeholder="Science Marks">
<input type="number" id="english" placeholder="English Marks"><br>

<button onclick="addStudent()">Add Student</button>
<button onclick="displayStudents()">Display All Students</button>
<button onclick="showTopStudents()">Above 80 Average</button>
<button onclick="showFailedStudents()">Failed Students</button>
<button onclick="countStudents()">Total Students</button>

<div id="output"></div>

</div>

<script>

let students = [];

function addStudent(){

let name = document.getElementById("name").value;
let roll = document.getElementById("roll").value;
let math = Number(document.getElementById("math").value);
let science = Number(document.getElementById("science").value);
let english = Number(document.getElementById("english").value);

let student = {
name:name,
roll:roll,
math:math,
science:science,
english:english
};

students.push(student);

alert("Student Added Successfully");

}

function displayStudents(){

let output = "<h3>All Students</h3>";

for(let s of students){

let total = s.math + s.science + s.english;
let avg = total/3;

output += `
<p>
Name: ${s.name} |
Roll: ${s.roll} |
Total: ${total} |
Average: ${avg.toFixed(2)}
</p>
`;

}

document.getElementById("output").innerHTML = output;

}

function showTopStudents(){

let output = "<h3>Students with Average > 80</h3>";

for(let s of students){

let avg = (s.math + s.science + s.english)/3;

if(avg > 80){
output += `<p>${s.name} - Average: ${avg.toFixed(2)}</p>`;
}

}

document.getElementById("output").innerHTML = output;

}

function showFailedStudents(){

let output = "<h3>Failed Students (Average < 40)</h3>";

for(let s of students){

let avg = (s.math + s.science + s.english)/3;

if(avg < 40){
output += `<p>${s.name} - Average: ${avg.toFixed(2)}</p>`;
}

}

document.getElementById("output").innerHTML = output;

}

function countStudents(){

document.getElementById("output").innerHTML =
"<h3>Total Students: " + students.length + "</h3>";

}

</script>

</body>
</html>
