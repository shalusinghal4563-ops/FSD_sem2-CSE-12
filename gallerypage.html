<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Product Grid</title>
    <link rel="stylesheet" href="gallery.css">
</head>
<body>
    <h1 class="title">Responsive Product Grid</h1>
    <div class="grid-container">
        <div class="product-card">
            <img src="airdopes.jpg" alt="">
            <h2>Product 1</h2>
            <p>High-quality item with great features.</p>
            <span class="price">&#8377 499</span></div>
        <div class="product-card">
            <img src="bag.jpg" alt="">
            <h2>Product 2</h2>
            <p>Durable and stylish for daily use.</p>
            <span class="price">&#8377 799</span></div>
        <div class="product-card">
            <img src="shoes.webp" alt="">
            <h2>Product 3</h2>
            <p>Lightweight and comfortable.</p>
            <span class="price">&#8377 1,299</span></div>
        <div class="product-card">
            <img src="necklace.webp" alt="">
            <h2>Product 4</h2>
            <p>Trendy design with premium quality.</p>
            <span class="price">&#8377 999</span> </div></div>
</body>
</html>
