<!DOCTYPE html>
<html>
<head>
  <title>Calculator</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f2f2f2;
      text-align: center;
      padding: 50px;
    }

    .container {
      background: white;
      width: 350px;
      margin: auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #333;
    }
  </style>

</head>

<body>

<div class="container">
  <h2>Simple Calculator</h2>

  <input type="number" id="num1" placeholder="Enter first number"><br>
  <input type="number" id="num2" placeholder="Enter second number"><br>

  <button onclick="calculate()">Calculate</button>

  <div id="result"></div>
</div>

<script>
function calculate() {
  let n1 = Number(document.getElementById("num1").value);
  let n2 = Number(document.getElementById("num2").value);

  let sum = n1 + n2;
  let diff = n1 - n2;
  let product = n1 * n2;

  document.getElementById("result").innerHTML =
    "Sum: " + sum + "<br>" +
    "Difference: " + diff + "<br>" +
    "Product: " + product;
}
</script>

</body>
</html>
