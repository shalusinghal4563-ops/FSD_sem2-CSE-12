<!DOCTYPE html>
<html>
<head>
    <title>Prime Number Checker</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container{
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            width: 350px;
        }

        h2{
            color: #333;
            margin-bottom: 20px;
        }

        input{
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }

        input:focus{
            border-color: #4CAF50;
        }

        button{
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background: #45a049;
        }

        #result{
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            color: #222;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Prime Number Checker</h2>

        <input type="number" id="num" placeholder="Enter a number">
        <br>
        <button onclick="checkPrime()">Check</button>

        <div id="result"></div>
    </div>

    <script>
        function checkPrime() {
            let n = parseInt(document.getElementById("num").value);
            let isPrime = true;

            if (n <= 1) {
                isPrime = false;
            } 
            else {
                for (let i = 2; i <= Math.sqrt(n); i++) {
                    if (n % i === 0) {
                        isPrime = false;
                        break;
                    }
                }
            }

            document.getElementById("result").innerHTML =
                isPrime ? n + " is a Prime Number" 
                        : n + " is Not a Prime Number";
        }
    </script>

</body>
</html>
